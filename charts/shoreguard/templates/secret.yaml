apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shoreguard.secretName" . }}
  labels:
    {{- include "shoreguard.labels" . | nindent 4 }}
type: Opaque
data:
  admin-password: {{ required "admin.password is required — set it via --set admin.password=... or a values file" .Values.admin.password | b64enc | quote }}
  secret-key: {{ include "shoreguard.secretKeyValue" . | b64enc | quote }}
