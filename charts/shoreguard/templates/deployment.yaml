{{- include "shoreguard.validate" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shoreguard.fullname" . }}
  labels:
    {{- include "shoreguard.labels" . | nindent 4 }}
spec:
  # Single-replica is the safe default and must stay so while the chart's
  # persistence is RWO-only (ReadWriteOnce PVC can't attach to two pods).
  # Multi-replica requires database.url set to an external Postgres; the
  # backend's check_production_readiness() hard-fails on replicaCount > 1
  # without a stable SHOREGUARD_SECRET_KEY, enforced at pod startup.
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- if gt (int .Values.replicaCount) 1 }}
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- else }}
    type: Recreate
    {{- end }}
  selector:
    matchLabels:
      {{- include "shoreguard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shoreguard.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force pod restart on config/secret changes so updates actually roll.
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "shoreguard.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: shoreguard
          image: {{ include "shoreguard.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          env:
            - name: SHOREGUARD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shoreguard.secretName" . }}
                  key: admin-password
            - name: SHOREGUARD_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "shoreguard.secretName" . }}
                  key: secret-key
            - name: SHOREGUARD_REPLICAS
              value: {{ .Values.replicaCount | quote }}
            - name: SHOREGUARD_FORWARDED_ALLOW_IPS
              value: {{ .Values.forwardedAllowIps | quote }}
            {{- if .Values.database.url }}
            - name: SHOREGUARD_DATABASE_URL
              value: {{ .Values.database.url | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "shoreguard.configMapName" . }}
          volumeMounts:
            - name: data
              mountPath: /home/shoreguard/.config/shoreguard
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "shoreguard.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
