# ShoreGuard Stack — local dev / homelab quickstart (single-VM scale)
#
# Audience: developers trying ShoreGuard on a laptop, homelab operators
# running a single VM, CI pipelines spinning up a full stack for
# integration tests. NOT a scale-out production deployment pattern.
#
# The `openshell` service here runs NVIDIA's k3s-in-container image
# (`ghcr.io/nvidia/openshell/cluster`). ShoreGuard does not own or
# version that image; this compose file just wires it up with mTLS
# init-containers so that a single `docker compose up` gets you a
# working stack. For production k8s installs, install NVIDIA's upstream
# OpenShell Helm chart directly into your cluster and install
# `charts/shoreguard` alongside it — see the project README.
#
# For a standalone ShoreGuard install without OpenShell (connecting to
# a remote gateway instead), use `docker-compose.standalone.yml`.
#
# Core (always active):
#   - caddy:         Reverse proxy with auto-TLS → https://<host>
#   - shoreguard:    Control plane UI + API     → https://<host>/
#   - openshell:     Sandbox runtime (k3s)      → gRPC via mTLS
#   - shoreguard-db: PostgreSQL for ShoreGuard
#
# Optional profiles:
#   - paperclip:     Agent orchestration (Paperclip AI)
#   - openclaw:      Agent gateway (OpenClaw)    → https://<host>:18789
#
# Usage:
#   cp .env.example .env                          # edit as needed
#   docker compose up -d                          # core only
#   docker compose --profile paperclip up -d      # core + Paperclip
#   docker compose --profile openclaw up -d       # core + OpenClaw

services:
  # ---------------------------------------------------------------------------
  # Caddy — reverse proxy with automatic TLS
  #
  # Provides HTTPS for all browser-facing services. Uses self-signed certs
  # by default (internal TLS). Set CADDY_DOMAIN to a real domain for
  # automatic Let's Encrypt certificates.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${SHOREGUARD_PORT:-443}:443"
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - stack
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # ShoreGuard — sandbox control plane
  # ---------------------------------------------------------------------------
  shoreguard-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shoreguard
      POSTGRES_PASSWORD: ${SHOREGUARD_DB_PASSWORD:-shoreguard}
      POSTGRES_DB: shoreguard
    volumes:
      - shoreguard-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoreguard"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - stack

  shoreguard:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SHOREGUARD_DATABASE_URL: "postgresql+psycopg://shoreguard:${SHOREGUARD_DB_PASSWORD:-shoreguard}@shoreguard-db:5432/shoreguard"
      SHOREGUARD_SECRET_KEY: ${SHOREGUARD_SECRET_KEY}
      SHOREGUARD_ADMIN_PASSWORD: ${SHOREGUARD_ADMIN_PASSWORD:-admin}
      SHOREGUARD_LOG_LEVEL: ${SHOREGUARD_LOG_LEVEL:-info}
      SHOREGUARD_ALLOW_REGISTRATION: "true"
      SHOREGUARD_LOCAL_MODE: "true"
    depends_on:
      shoreguard-db:
        condition: service_healthy
    networks:
      - stack
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # OpenShell — sandbox runtime (k3s in Docker)
  # ---------------------------------------------------------------------------
  openshell:
    image: ghcr.io/nvidia/openshell/cluster:0.0.22
    restart: unless-stopped
    privileged: true
    volumes:
      - openshell-data:/var/lib/rancher
      - init-certs:/certs
    networks:
      - stack
    deploy:
      resources:
        limits:
          memory: 2G

  # ---------------------------------------------------------------------------
  # Paperclip — agent orchestration (optional, enable with --profile paperclip)
  #
  # After starting, complete the onboarding at http://localhost:3100:
  #   1. Run: docker exec -it deploy-paperclip-1 pnpm paperclipai onboard
  #   2. Open the invite URL in your browser to create your admin account
  #   3. Configure your LLM provider in the Paperclip UI
  #   4. Install the ShoreGuard plugin:
  #      docker exec deploy-paperclip-1 pnpm paperclipai plugin install \
  #        @shoreguard/paperclip-plugin
  # ---------------------------------------------------------------------------
  paperclip-db:
    image: postgres:17-alpine
    profiles: ["paperclip"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${PAPERCLIP_DB_PASSWORD:-paperclip}
      POSTGRES_DB: paperclip
    volumes:
      - paperclip-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - stack

  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    profiles: ["paperclip"]
    restart: unless-stopped
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      DATABASE_URL: "postgres://paperclip:${PAPERCLIP_DB_PASSWORD:-paperclip}@paperclip-db:5432/paperclip"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      paperclip-db:
        condition: service_healthy
    networks:
      - stack

  # ---------------------------------------------------------------------------
  # OpenClaw — hardened agent sandbox (optional, enable with --profile openclaw)
  #
  # Deploys OpenClaw inside an OpenShell sandbox with:
  #   - Routed inference via OpenShell L7 proxy (inference.local/v1)
  #   - Hardened config (read-only, hash-pinned, Landlock-protected)
  #   - Privilege separation (gateway user vs sandbox user)
  #   - Network policies per binary+host+method
  #
  # The init container calls ShoreGuard's API to:
  #   1. Create sandbox from the hardened OpenClaw image
  #   2. Register the inference provider
  #   3. Configure inference routing
  #   4. Inject and lock openclaw.json
  #   5. Apply the hardened policy preset
  #
  # After deployment, access the OpenClaw UI via:
  #   https://<host>:18789 (proxied through Caddy)
  # ---------------------------------------------------------------------------
  init-openclaw-sandbox:
    image: curlimages/curl:latest
    profiles: ["openclaw"]
    depends_on:
      shoreguard:
        condition: service_started
      init-gateway:
        condition: service_completed_successfully
    networks:
      - stack
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        SG="http://shoreguard:8888"
        GW="dev"
        SB_NAME="openclaw"
        SB_IMAGE="ghcr.io/shoreguard/openclaw-sandbox:latest"
        PROVIDER_TYPE="${OPENCLAW_PROVIDER_TYPE:-anthropic}"
        MODEL_ID="${OPENCLAW_MODEL_ID:-claude-sonnet-4-6}"

        echo "Waiting for ShoreGuard..."
        until curl -sf $$SG/healthz > /dev/null 2>&1; do sleep 2; done
        echo "ShoreGuard ready."

        echo "Logging in..."
        curl -s -c /tmp/cookies -X POST $$SG/api/auth/login \
          -H 'Content-Type: application/json' \
          -d '{"email":"admin@localhost","password":"${SHOREGUARD_ADMIN_PASSWORD:-admin}"}'
        echo ""

        # --- Step 1: Create sandbox ---
        echo "Creating sandbox '$$SB_NAME'..."
        CREATE=$$(curl -s -b /tmp/cookies -X POST \
          $$SG/api/gateways/$$GW/sandboxes \
          -H 'Content-Type: application/json' \
          -d "{
            \"name\":\"$$SB_NAME\",
            \"image\":\"$$SB_IMAGE\",
            \"presets\":[\"openclaw\"],
            \"labels\":{\"shoreguard.io/type\":\"openclaw\",\"shoreguard.io/provider\":\"$$PROVIDER_TYPE\"},
            \"description\":\"OpenClaw agent ($$PROVIDER_TYPE/$$MODEL_ID)\"
          }")
        echo "Create: $$CREATE"

        # Poll sandbox creation
        OP_ID=$$(echo "$$CREATE" | grep -o '"operation_id":"[^"]*"' | cut -d'"' -f4)
        if [ -n "$$OP_ID" ]; then
          echo "Waiting for sandbox ready (op $$OP_ID)..."
          for i in $$(seq 1 60); do
            STATUS=$$(curl -s -b /tmp/cookies $$SG/api/operations/$$OP_ID \
              | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            [ "$$STATUS" = "succeeded" ] && break
            [ "$$STATUS" = "failed" ] && { echo "Sandbox creation failed!"; exit 1; }
            sleep 5
          done
        fi
        echo "Sandbox ready."

        # --- Step 2: Register inference provider ---
        PROVIDER_NAME="$$SB_NAME-$$PROVIDER_TYPE"
        echo "Registering provider '$$PROVIDER_NAME'..."
        curl -s -b /tmp/cookies -X POST \
          $$SG/api/gateways/$$GW/providers \
          -H 'Content-Type: application/json' \
          -d "{
            \"name\":\"$$PROVIDER_NAME\",
            \"provider_type\":\"$$PROVIDER_TYPE\",
            \"api_key\":\"${OPENCLAW_API_KEY}\"
          }" || true
        echo ""

        # --- Step 3: Configure inference routing ---
        echo "Setting inference route..."
        curl -s -b /tmp/cookies -X PUT \
          $$SG/api/gateways/$$GW/inference \
          -H 'Content-Type: application/json' \
          -d "{
            \"provider_name\":\"$$PROVIDER_NAME\",
            \"model_id\":\"$$MODEL_ID\",
            \"verify\":false
          }"
        echo ""

        # --- Step 4: Inject openclaw.json via exec ---
        echo "Injecting OpenClaw config..."
        GATEWAY_TOKEN="${OPENCLAW_GATEWAY_TOKEN}"
        CONFIG=$$(cat <<JSONEOF
        {
          "agents":{"defaults":{"model":{"primary":"$$MODEL_ID"}}},
          "models":{"mode":"merge","providers":{
            "$$PROVIDER_TYPE":{"baseUrl":"https://inference.local/v1","models":[
              {"id":"$$MODEL_ID","contextWindow":131072,"maxOutput":8192}
            ]}
          }},
          "gateway":{
            "mode":"local","bind":"lan",
            "controlUi":{
              "dangerouslyAllowHostHeaderOriginFallback":true,
              "dangerouslyDisableDeviceAuth":true,
              "allowedOrigins":["http://127.0.0.1:18789"]
            },
            "trustedProxies":["127.0.0.1","::1"],
            "auth":{"mode":"token","token":"$$GATEWAY_TOKEN"}
          }
        }
        JSONEOF
        )

        # Write config via exec (env var avoids shell injection)
        curl -s -b /tmp/cookies -X POST \
          $$SG/api/gateways/$$GW/sandboxes/$$SB_NAME/exec \
          -H 'Content-Type: application/json' \
          -d "{
            \"command\":\"echo \\\"\\$$OPENCLAW_CONFIG\\\" > /home/node/.openclaw/openclaw.json\",
            \"env\":{\"OPENCLAW_CONFIG\":$$(echo "$$CONFIG" | tr -d '\n' | sed 's/"/\\"/g')},
            \"timeout_seconds\":10
          }" || true
        echo ""

        # Lock config and pin hash
        curl -s -b /tmp/cookies -X POST \
          $$SG/api/gateways/$$GW/sandboxes/$$SB_NAME/exec \
          -H 'Content-Type: application/json' \
          -d "{
            \"command\":\"chmod 444 /home/node/.openclaw/openclaw.json && chown root:root /home/node/.openclaw/openclaw.json && cd /home/node/.openclaw && sha256sum openclaw.json > .config-hash && chmod 444 .config-hash && chown root:root .config-hash\",
            \"timeout_seconds\":10
          }" || true
        echo ""

        echo "OpenClaw sandbox deployment complete."
        echo "Access: https://<host>:18789 (token: $$GATEWAY_TOKEN)"

  # ---------------------------------------------------------------------------
  # Init — generate mTLS certificates for OpenShell's gRPC endpoint
  #
  # OpenShell's Helm chart expects TLS secrets for its gRPC server.
  # This init container generates a self-signed CA, server cert, and client
  # cert, then creates the required k8s secrets inside OpenShell's k3s
  # cluster.  The client cert + CA are written to a shared volume so that
  # init-gateway can register the gateway with mTLS credentials.
  #
  # For production, replace the self-signed CA with certs from your PKI or
  # use cert-manager inside the k3s cluster.
  # ---------------------------------------------------------------------------
  init-openshell:
    image: docker:cli
    depends_on:
      openshell:
        condition: service_started
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - init-certs:/certs
    command:
      - sh
      - -c
      - |
        OPENSHELL=deploy-openshell-1

        echo "Waiting for k3s API inside OpenShell..."
        until docker exec $$OPENSHELL kubectl get nodes > /dev/null 2>&1; do sleep 3; done
        echo "k3s API ready."

        echo "Waiting for openshell namespace..."
        until docker exec $$OPENSHELL kubectl get ns openshell > /dev/null 2>&1; do sleep 3; done
        echo "Namespace ready."

        # Skip if secrets already exist (idempotent)
        if docker exec $$OPENSHELL kubectl get secret openshell-server-tls -n openshell > /dev/null 2>&1; then
          echo "TLS secrets already exist, skipping."
          # Export CA for init-gateway if not on shared volume yet
          if [ ! -f /certs/ca.crt ]; then
            docker exec $$OPENSHELL kubectl get secret openshell-server-client-ca -n openshell \
              -o jsonpath='{.data.ca\.crt}' | base64 -d > /certs/ca.crt
          fi
        else
          echo "Generating mTLS certificates..."

          # Generate certs on the shared volume (mounted in both containers)
          docker exec $$OPENSHELL sh -c '
            # --- CA ---
            openssl genpkey -algorithm RSA -out /certs/ca.key -pkeyopt rsa_keygen_bits:2048 2>/dev/null
            openssl req -x509 -new -key /certs/ca.key -out /certs/ca.crt -days 3650 \
              -subj "/CN=openshell-ca" \
              -addext "basicConstraints=critical,CA:TRUE" \
              -addext "keyUsage=critical,keyCertSign,cRLSign" 2>/dev/null

            # --- Server cert (for OpenShell gRPC) ---
            openssl genpkey -algorithm RSA -out /certs/server.key -pkeyopt rsa_keygen_bits:2048 2>/dev/null
            openssl req -new -key /certs/server.key -out /certs/server.csr -subj "/CN=openshell" 2>/dev/null
            printf "subjectAltName=DNS:openshell,DNS:openshell-0,DNS:openshell.openshell.svc.cluster.local,DNS:localhost,IP:127.0.0.1\nbasicConstraints=CA:FALSE\nkeyUsage=digitalSignature,keyEncipherment\nextendedKeyUsage=serverAuth\n" > /certs/server.ext
            openssl x509 -req -in /certs/server.csr -CA /certs/ca.crt -CAkey /certs/ca.key \
              -CAcreateserial -out /certs/server.crt -days 3650 -extfile /certs/server.ext 2>/dev/null

            # --- Client cert (for ShoreGuard to connect) ---
            openssl genpkey -algorithm RSA -out /certs/client.key -pkeyopt rsa_keygen_bits:2048 2>/dev/null
            openssl req -new -key /certs/client.key -out /certs/client.csr -subj "/CN=shoreguard-client" 2>/dev/null
            printf "basicConstraints=CA:FALSE\nkeyUsage=digitalSignature,keyEncipherment\nextendedKeyUsage=clientAuth\n" > /certs/client.ext
            openssl x509 -req -in /certs/client.csr -CA /certs/ca.crt -CAkey /certs/ca.key \
              -CAcreateserial -out /certs/client.crt -days 3650 -extfile /certs/client.ext 2>/dev/null

            # Make certs readable for init-gateway (runs as non-root)
            chmod 644 /certs/*.crt /certs/*.key

            # --- Create k8s secrets ---
            kubectl create secret tls openshell-server-tls -n openshell \
              --cert=/certs/server.crt --key=/certs/server.key
            kubectl create secret generic openshell-server-client-ca -n openshell \
              --from-file=ca.crt=/certs/ca.crt
            kubectl create secret generic openshell-client-tls -n openshell \
              --from-file=tls.crt=/certs/client.crt \
              --from-file=tls.key=/certs/client.key \
              --from-file=ca.crt=/certs/ca.crt
            kubectl create secret generic openshell-ssh-handshake -n openshell \
              --from-literal=secret=$(openssl rand -hex 32)
          '
          echo "TLS secrets created."
        fi

        echo "Waiting for OpenShell pod to be ready..."
        docker exec $$OPENSHELL kubectl wait --for=condition=ready pod/openshell-0 -n openshell --timeout=180s
        echo "OpenShell init complete."

  # ---------------------------------------------------------------------------
  # Init — register OpenShell gateway in ShoreGuard on first start
  # ---------------------------------------------------------------------------
  init-gateway:
    image: curlimages/curl:latest
    depends_on:
      shoreguard:
        condition: service_started
      init-openshell:
        condition: service_completed_successfully
    networks:
      - stack
    restart: "no"
    entrypoint: ["sh", "-c"]
    volumes:
      - init-certs:/certs:ro
    command:
      - |
        echo "Waiting for ShoreGuard..."
        until curl -sf http://shoreguard:8888/healthz > /dev/null 2>&1; do sleep 2; done
        echo "ShoreGuard ready."

        echo "Logging in..."
        curl -s -c /tmp/cookies -X POST http://shoreguard:8888/api/auth/login \
          -H 'Content-Type: application/json' \
          -d '{"email": "admin@localhost", "password": "${SHOREGUARD_ADMIN_PASSWORD:-admin}"}'

        echo ""
        echo "Checking if gateway 'dev' exists..."
        GW_COUNT=$$(curl -s -b /tmp/cookies http://shoreguard:8888/api/gateway/list | grep -c '"name"')
        if [ "$$GW_COUNT" = "0" ]; then
          echo "Registering gateway 'dev' with mTLS..."
          CA_B64=$$(cat /certs/ca.crt | base64 | tr -d '\n')
          CLIENT_CERT_B64=$$(cat /certs/client.crt | base64 | tr -d '\n')
          CLIENT_KEY_B64=$$(cat /certs/client.key | base64 | tr -d '\n')
          curl -s -b /tmp/cookies -X POST http://shoreguard:8888/api/gateway/register \
            -H 'Content-Type: application/json' \
            -d "{\"name\":\"dev\",\"endpoint\":\"openshell:30051\",\"scheme\":\"https\",\"auth_mode\":\"mtls\",\"description\":\"Local OpenShell cluster\",\"ca_cert\":\"$${CA_B64}\",\"client_cert\":\"$${CLIENT_CERT_B64}\",\"client_key\":\"$${CLIENT_KEY_B64}\"}"
          echo ""
          echo "Gateway registered."
        else
          echo "Gateway already exists, skipping."
        fi

        echo "Creating service principal..."
        curl -s -b /tmp/cookies -X POST http://shoreguard:8888/api/auth/service-principals \
          -H 'Content-Type: application/json' \
          -d '{"name":"paperclip","role":"operator"}' || true
        echo ""
        echo "Init complete."

networks:
  stack:

volumes:
  caddy-data:
  caddy-config:
  shoreguard-pgdata:
  paperclip-pgdata:
  paperclip-data:
  openshell-data:
  init-certs:
