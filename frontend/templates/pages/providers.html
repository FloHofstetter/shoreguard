{% extends "base.html" %}
{% block title %}Providers — Shoreguard{% endblock %}

{% block breadcrumbs %}
<ol class="breadcrumb mb-0">
    <li class="breadcrumb-item"><a href="/gateways">Gateways</a></li>
    <li class="breadcrumb-item"><a href="/gateways/{{ gateway_name }}">{{ gateway_name }}</a></li>
    <li class="breadcrumb-item active">Providers</li>
</ol>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Providers</h5>
    <div class="btn-group btn-group-sm">
        <button class="btn btn-outline-secondary" onclick="loadProvidersPage()" title="Refresh">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
        <a class="btn btn-outline-success" href="/gateways/{{ gateway_name }}/providers/new" data-sg-min-role="operator">
            <i class="bi bi-plus-lg me-1"></i>New
        </a>
    </div>
</div>
<div id="providers-page-content"></div>
{% endblock %}


{% block extra_js %}
<script src="/static/js/providers.js"></script>
{% endblock %}
