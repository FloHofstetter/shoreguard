<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup — Shoreguard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .setup-card { max-width: 420px; width: 100%; }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="card sg-card-themed">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-check fs-1" style="color: var(--sg-accent)"></i>
                    <h4 class="mt-2 mb-1">Welcome to Shoreguard</h4>
                    <p class="text-muted small">Create your admin account to get started.</p>
                </div>

                <form id="setup-form">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input
                            type="email"
                            id="setup-email"
                            class="form-control"
                            placeholder="admin@example.com"
                            autocomplete="email"
                            autofocus
                            required
                        >
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input
                            type="password"
                            id="setup-password"
                            class="form-control"
                            placeholder="Choose a strong password"
                            autocomplete="new-password"
                            minlength="8"
                            required
                        >
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input
                            type="password"
                            id="setup-confirm"
                            class="form-control"
                            placeholder="Repeat password"
                            autocomplete="new-password"
                            required
                        >
                    </div>
                    <div id="setup-error" class="text-danger small mb-3" style="display:none"></div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-check-circle me-1"></i>Create Admin Account
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('setup-email').value.trim();
            const password = document.getElementById('setup-password').value;
            const confirm = document.getElementById('setup-confirm').value;
            const errEl = document.getElementById('setup-error');
            errEl.style.display = 'none';

            if (password !== confirm) {
                errEl.textContent = 'Passwords do not match';
                errEl.style.display = '';
                return;
            }
            if (password.length < 8) {
                errEl.textContent = 'Password must be at least 8 characters';
                errEl.style.display = '';
                return;
            }

            try {
                const resp = await fetch('/api/auth/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                if (resp.ok) {
                    let next = new URLSearchParams(window.location.search).get('next') || '/';
                    if (!next.startsWith('/') || next.startsWith('//')) next = '/';
                    window.location.href = next;
                } else {
                    const body = await resp.json().catch(() => ({}));
                    errEl.textContent = body.detail || 'Setup failed';
                    errEl.style.display = '';
                }
            } catch {
                errEl.textContent = 'Network error — is the server running?';
                errEl.style.display = '';
            }
        });
    </script>
</body>
</html>
