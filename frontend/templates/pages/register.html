<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Shoreguard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .register-card { max-width: 400px; width: 100%; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="card sg-card-themed">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-check fs-1" style="color: var(--sg-accent)"></i>
                    <h4 class="mt-2 mb-1">Create Account</h4>
                    <p class="text-muted small">Register for a Shoreguard account.</p>
                </div>

                <form id="register-form">
                    <div class="mb-3">
                        <input
                            type="email"
                            id="reg-email"
                            class="form-control"
                            placeholder="Email"
                            autocomplete="email"
                            autofocus
                            required
                        >
                    </div>
                    <div class="mb-3">
                        <input
                            type="password"
                            id="reg-password"
                            class="form-control"
                            placeholder="Password"
                            autocomplete="new-password"
                            minlength="8"
                            required
                        >
                        <div class="form-text">Minimum 8 characters</div>
                    </div>
                    <div class="mb-3">
                        <input
                            type="password"
                            id="reg-confirm"
                            class="form-control"
                            placeholder="Confirm password"
                            autocomplete="new-password"
                            required
                        >
                    </div>
                    <div id="reg-error" class="text-danger small mb-3" style="display:none"></div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-person-plus me-1"></i>Register
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="/login" class="text-muted small">Already have an account? Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const errEl = document.getElementById('reg-error');
            const btn = e.target.querySelector('button[type="submit"]');
            errEl.style.display = 'none';

            if (password !== confirm) {
                errEl.textContent = 'Passwords do not match';
                errEl.style.display = '';
                return;
            }
            if (password.length < 8) {
                errEl.textContent = 'Password must be at least 8 characters';
                errEl.style.display = '';
                return;
            }

            btn.disabled = true;
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    const body = await resp.json().catch(() => ({}));
                    errEl.textContent = body.detail || 'Registration failed';
                    errEl.style.display = '';
                }
            } catch {
                errEl.textContent = 'Network error — is the server running?';
                errEl.style.display = '';
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
