<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <script src="/static/js/theme-init.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Shoreguard</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="theme-color" content="#76b900">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/css/auth.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body class="sg-auth-body">
    <div class="register-card" x-data="{
        email: '',
        password: '',
        confirm: '',
        error: '',
        loading: false,

        async submit() {
            this.error = '';
            if (this.password !== this.confirm) {
                this.error = 'Passwords do not match';
                return;
            }
            if (this.password.length < 8) {
                this.error = 'Password must be at least 8 characters';
                return;
            }
            this.loading = true;
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: this.email.trim(), password: this.password }),
                });
                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    const body = await resp.json().catch(() => ({}));
                    this.error = body.detail || 'Registration failed';
                }
            } catch {
                this.error = 'Network error — is the server running?';
            } finally {
                this.loading = false;
            }
        }
    }">
        <div class="card sg-card-themed">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-check fs-1 sg-text-accent"></i>
                    <h4 class="mt-2 mb-1">Create Account</h4>
                    <p class="text-muted small">Register for a Shoreguard account.</p>
                </div>

                <form @submit.prevent="submit">
                    <div class="mb-3">
                        <input
                            type="email"
                            x-model="email"
                            class="form-control"
                            placeholder="Email"
                            autocomplete="email"
                            autofocus
                            required
                        >
                    </div>
                    <div class="mb-3">
                        <input
                            type="password"
                            x-model="password"
                            class="form-control"
                            placeholder="Password"
                            autocomplete="new-password"
                            minlength="8"
                            required
                        >
                        <div class="form-text">Minimum 8 characters</div>
                    </div>
                    <div class="mb-3">
                        <input
                            type="password"
                            x-model="confirm"
                            class="form-control"
                            placeholder="Confirm password"
                            autocomplete="new-password"
                            required
                        >
                    </div>
                    <div x-show="error" x-text="error" class="text-danger small mb-3" x-cloak></div>
                    <button type="submit" class="btn btn-success w-100" :disabled="loading">
                        <i class="bi bi-person-plus me-1"></i>Register
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="/login" class="text-muted small">Already have an account? Sign in</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
