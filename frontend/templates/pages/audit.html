{% extends "base.html" %}
{% block title %}Audit Log — Shoreguard{% endblock %}

{% block breadcrumbs %}
<ol class="breadcrumb mb-0">
    <li class="breadcrumb-item active">Audit Log</li>
</ol>
{% endblock %}

{% block content %}
<div x-data="auditPage()" x-init="load()">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0"><i class="bi bi-journal-text me-2"></i>Audit Log</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-secondary" @click="exportAudit('csv')">
                <i class="bi bi-filetype-csv me-1"></i>Export CSV
            </button>
            <button class="btn btn-sm btn-outline-secondary" @click="exportAudit('json')">
                <i class="bi bi-filetype-json me-1"></i>Export JSON
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="row g-2 mb-3">
        <div class="col-md-3">
            <input type="text" class="form-control form-control-sm" placeholder="Actor"
                   x-model.debounce.300ms="filterActor" @input="load()">
        </div>
        <div class="col-md-2">
            <select class="form-select form-select-sm" x-model="filterResourceType" @change="load()">
                <option value="">All resources</option>
                <option value="gateway">Gateway</option>
                <option value="sandbox">Sandbox</option>
                <option value="policy">Policy</option>
                <option value="approval">Approval</option>
                <option value="provider">Provider</option>
                <option value="user">User</option>
                <option value="service_principal">Service Principal</option>
                <option value="inference">Inference</option>
            </select>
        </div>
        <div class="col-md-3">
            <input type="text" class="form-control form-control-sm" placeholder="Action (e.g. sandbox.create)"
                   x-model.debounce.300ms="filterAction" @input="load()">
        </div>
        <div class="col-md-2">
            <input type="text" class="form-control form-control-sm" placeholder="Gateway"
                   x-model.debounce.300ms="filterGateway" @input="load()">
        </div>
        <div class="col-md-2">
            <button class="btn btn-sm btn-outline-secondary" @click="clearFilters()" x-show="hasFilters">
                <i class="bi bi-x-circle me-1"></i>Clear
            </button>
        </div>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center text-muted py-5">
        <div class="spinner-border spinner-border-sm me-2"></div>Loading audit log...
    </div>

    <!-- Error -->
    <div x-show="error" class="alert alert-danger" x-text="error"></div>

    <!-- Empty -->
    <div x-show="!loading && !error && $empty(entries)" class="text-center text-muted py-5">
        <i class="bi bi-journal fs-1 d-block mb-3"></i>
        <p>No audit entries found.</p>
    </div>

    <!-- Table -->
    <div x-show="!loading && !error && $notEmpty(entries)" class="table-responsive">
        <table class="table table-striped table-sm align-middle">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Actor</th>
                    <th>Role</th>
                    <th>Action</th>
                    <th>Resource</th>
                    <th>ID</th>
                    <th>Gateway</th>
                    <th>IP</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="entry in entries" :key="entry.id">
                    <tr>
                        <td class="text-muted small text-nowrap" x-text="formatTs(entry.timestamp)"></td>
                        <td x-text="entry.actor"></td>
                        <td><span class="badge bg-secondary" x-text="entry.actor_role"></span></td>
                        <td><code x-text="entry.action"></code></td>
                        <td><span class="badge bg-dark" x-text="entry.resource_type"></span></td>
                        <td class="font-monospace small" x-text="entry.resource_id || '—'"></td>
                        <td class="text-muted small" x-text="entry.gateway || '—'"></td>
                        <td class="text-muted small" x-text="entry.client_ip || '—'"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

</div>

<script src="/static/js/audit.js"></script>
{% endblock %}
