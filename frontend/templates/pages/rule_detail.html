{% extends "pages/sandbox_base.html" %}
{% block title %}{{ rule_key }} — {{ sandbox_name }} — Shoreguard{% endblock %}

{% block breadcrumb_tail %}
<li class="breadcrumb-item"><a href="/gateways/{{ gateway_name }}/sandboxes/{{ sandbox_name }}/policy">Policy</a></li>
<li class="breadcrumb-item"><a href="/gateways/{{ gateway_name }}/sandboxes/{{ sandbox_name }}/network-policies">Network</a></li>
<li class="breadcrumb-item active">{{ rule_key }}</li>
{% endblock %}

{% block content %}
<div id="rule-content"></div>
{% endblock %}

{% block sandbox_js %}
<script src="/static/js/rule.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadRuleDetail({{ sandbox_name|tojson }}, {{ rule_key|tojson }});
});
</script>
{% endblock %}
