{% extends "pages/sandbox_base.html" %}
{% block title %}{{ sandbox_name }} — Shoreguard{% endblock %}

{% block content %}
<div x-data='sandboxDetail({{ sandbox_name|tojson }})' x-init="init()"
     @sg:ws-state.window="onWsState($event)">
    <!-- Loading -->
    <div x-show="loading" class="text-center text-muted py-5">
        <div class="spinner-border spinner-border-sm me-2"></div>Loading sandbox...
    </div>

    <!-- Error -->
    <div x-show="error" x-cloak class="alert alert-danger" x-text="error"></div>

    <!-- Content -->
    <template x-if="!loading && !error && sandbox">
        <div>
            <!-- Hero Header -->
            <div class="sandbox-hero">
                <div class="d-flex align-items-center gap-3 mb-2">
                    <h3 class="mb-0" x-text="sandbox.name"></h3>
                    <span class="badge" :class="phaseBadge()" x-text="sandbox.phase"></span>
                    <span x-show="wsState !== 'connected'"
                          x-cloak
                          class="badge text-bg-warning ms-1">
                        <i class="bi bi-wifi-off"></i>
                        <span x-text="wsState === 'reconnecting' ? 'Reconnecting\u2026' : wsState === 'failed' ? 'Disconnected' : ''"></span>
                    </span>
                </div>
                <div class="sandbox-meta">
                    <span class="font-monospace" x-text="sandbox.image || 'Default image'"></span>
                    <span x-text="sandbox.namespace || 'default'"></span>
                    <span x-show="sandbox.created_at_ms" x-text="formatTimestamp(sandbox.created_at_ms)"></span>
                    <span x-show="sandbox.gpu"><i class="bi bi-gpu-card text-info me-1"></i>GPU</span>
                </div>
            </div>

            <!-- Summary Cards -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <a :href="gwUrl('/sandboxes/' + sandboxName + '/policy')" class="card text-decoration-none policy-overview-card sg-card-themed h-100">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-2">
                                <i class="bi bi-shield-lock text-info me-2"></i>
                                <h6 class="mb-0">Policy</h6>
                            </div>
                            <div class="fs-2 fw-bold mb-1" x-text="networkCount"></div>
                            <span class="text-muted small" x-text="networkLabel() + ' \u00b7 v' + (sandbox.current_policy_version || '?')"></span>
                        </div>
                        <div class="card-footer border-0 pt-0 small bg-transparent">
                            Manage <i class="bi bi-arrow-right"></i>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a :href="gwUrl('/sandboxes/' + sandboxName + '/approvals')" class="card text-decoration-none policy-overview-card sg-card-themed h-100">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-2">
                                <i class="bi bi-check-circle me-2" :class="pendingCount > 0 ? 'text-warning' : 'text-success'"></i>
                                <h6 class="mb-0">Approvals</h6>
                            </div>
                            <div class="fs-2 fw-bold mb-1" :class="pendingCount > 0 ? 'text-warning' : ''" x-text="pendingCount"></div>
                            <span class="text-muted small" x-text="pendingLabel()"></span>
                        </div>
                        <div class="card-footer border-0 pt-0 small bg-transparent">
                            <span x-text="pendingCount > 0 ? 'Review' : 'View history'"></span> <i class="bi bi-arrow-right"></i>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a :href="gwUrl('/sandboxes/' + sandboxName + '/logs')" class="card text-decoration-none policy-overview-card sg-card-themed h-100">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-2">
                                <i class="bi bi-journal-text text-muted me-2"></i>
                                <h6 class="mb-0">Logs</h6>
                            </div>
                            <span class="text-muted small">Live log stream and history</span>
                        </div>
                        <div class="card-footer border-0 pt-0 small bg-transparent">
                            View <i class="bi bi-arrow-right"></i>
                        </div>
                    </a>
                </div>
            </div>

            <!-- Metadata (labels & description) -->
            <fieldset class="sg-fieldset mb-4">
                <legend class="sg-legend">Metadata</legend>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label small text-muted"><i class="bi bi-card-text me-1"></i>Description</label>
                        <template x-if="$store.auth.hasRole('operator')">
                            <input type="text" class="form-control form-control-sm" x-model="metaForm.description"
                                   placeholder="e.g. ML training sandbox for team-alpha" maxlength="1000">
                        </template>
                        <template x-if="!$store.auth.hasRole('operator')">
                            <div class="form-control-plaintext small" x-text="sandbox?.description || '—'"></div>
                        </template>
                    </div>
                    <div class="col-12">
                        <label class="form-label small text-muted"><i class="bi bi-tags me-1"></i>Labels</label>
                        <div x-show="metaLabels.length > 0" class="mb-2 d-flex flex-wrap gap-1">
                            <template x-for="lbl in metaLabels" :key="lbl.key">
                                <span class="badge text-bg-light border d-inline-flex align-items-center gap-1">
                                    <span class="font-monospace" x-text="lbl.key"></span>
                                    <span class="text-muted">=</span>
                                    <span x-text="lbl.val"></span>
                                    <button x-show="$store.auth.hasRole('operator')" type="button"
                                            class="btn-close btn-close-sm ms-1 sg-fs-xxs"
                                            @click="removeMetaLabel(lbl.key)"></button>
                                </span>
                            </template>
                        </div>
                        <div x-show="$store.auth.hasRole('operator') && metaLabels.length < 20"
                             class="input-group input-group-sm sg-mw-400">
                            <input type="text" class="form-control font-monospace" x-model="newMetaKey"
                                   placeholder="key" @keydown.enter.prevent="addMetaLabel()">
                            <span class="input-group-text">=</span>
                            <input type="text" class="form-control" x-model="newMetaVal"
                                   placeholder="value" @keydown.enter.prevent="addMetaLabel()">
                            <button class="btn btn-outline-success" type="button" @click="addMetaLabel()"
                                    :disabled="!newMetaKey.trim()">
                                <i class="bi bi-plus"></i>
                            </button>
                        </div>
                        <span x-show="!$store.auth.hasRole('operator') && metaLabels.length === 0"
                              class="text-muted fst-italic small">No labels</span>
                    </div>
                </div>
                <div x-show="$store.auth.hasRole('operator')" x-cloak class="d-flex align-items-center gap-2 pt-2">
                    <button class="btn btn-primary btn-sm" @click="saveMeta()" :disabled="saving">
                        <template x-if="saving"><span class="spinner-border spinner-border-sm me-1"></span></template>
                        <i x-show="!saving" class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <span x-show="saveOutput" class="small" x-html="saveOutput"></span>
                </div>
            </fieldset>

            <!-- Properties -->
            <h6 class="text-muted mb-3">Properties</h6>
            <dl class="row mb-0 small">
                <dt class="col-sm-2 text-muted fw-normal">ID</dt>
                <dd class="col-sm-10 font-monospace" x-text="sandbox.id"></dd>
            </dl>
        </div>
    </template>
</div>
{% endblock %}

{% block modals %}
{% include "components/approval_modal.html" %}
{% endblock %}

{% block sandbox_js %}{% endblock %}
