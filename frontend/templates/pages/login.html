<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Shoreguard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { max-width: 380px; width: 100%; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card sg-card-themed">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-check fs-1" style="color: var(--sg-accent)"></i>
                    <h4 class="mt-2 mb-1">Shoreguard</h4>
                    <p class="text-muted small">Enter your API key to continue.</p>
                </div>

                <form id="login-form">
                    <div class="mb-3">
                        <input
                            type="password"
                            id="api-key-input"
                            class="form-control"
                            placeholder="API Key"
                            autocomplete="current-password"
                            autofocus
                            required
                        >
                    </div>
                    <div id="login-error" class="text-danger small mb-3" style="display:none"></div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Log in
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const key = document.getElementById('api-key-input').value.trim();
            const errEl = document.getElementById('login-error');
            errEl.style.display = 'none';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key }),
                });
                if (resp.ok) {
                    let next = new URLSearchParams(window.location.search).get('next') || '/';
                    if (!next.startsWith('/') || next.startsWith('//')) next = '/';
                    window.location.href = next;
                } else {
                    const body = await resp.json().catch(() => ({}));
                    errEl.textContent = body.detail || 'Invalid API key';
                    errEl.style.display = '';
                }
            } catch {
                errEl.textContent = 'Network error — is the server running?';
                errEl.style.display = '';
            }
        });
    </script>
</body>
</html>
