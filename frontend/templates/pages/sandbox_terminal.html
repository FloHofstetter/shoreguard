{% extends "pages/sandbox_base.html" %}
{% block title %}Terminal — {{ sandbox_name }} — Shoreguard{% endblock %}

{% block breadcrumb_tail %}
<li class="breadcrumb-item active">Terminal</li>
{% endblock %}

{% block content %}
<div x-data='terminalPage({{ sandbox_name|tojson }})'>
    <div class="d-flex gap-2 mb-2">
        <div class="input-group input-group-sm flex-grow-1">
            <span class="input-group-text font-monospace sg-surface-card">$</span>
            <input type="text" class="form-control font-monospace sg-surface-log" x-ref="termInput"
                   placeholder="ls -la" autocomplete="off"
                   x-model="commandInput"
                   @keydown="handleKey($event)"
                   :disabled="running">
        </div>
        <button class="btn btn-success btn-sm" @click="runCommand()" :disabled="running">
            <i class="bi bi-play-fill me-1"></i>Run
        </button>
        <button class="btn btn-outline-secondary btn-sm" @click="clearOutput()" title="Clear">
            <i class="bi bi-trash"></i>
        </button>
    </div>
    <div class="log-output font-monospace sg-min-h-300" x-ref="termOutput">
        <template x-for="(line, i) in outputLines" :key="i">
            <div class="log-line" :class="line.cls || ''" :style="line.css || ''" x-text="line.text"></div>
        </template>
    </div>
</div>
{% endblock %}
