{% extends "base.html" %}
{% block title %}API Keys — Shoreguard{% endblock %}

{% block breadcrumbs %}
<ol class="breadcrumb mb-0">
    <li class="breadcrumb-item active">API Keys</li>
</ol>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">API Keys</h5>
    <div class="btn-group btn-group-sm">
        <button class="btn btn-outline-secondary" onclick="loadKeysPage()" title="Refresh">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
        <button class="btn btn-outline-success" data-bs-toggle="modal" data-bs-target="#createKeyModal">
            <i class="bi bi-plus-lg me-1"></i>New Key
        </button>
    </div>
</div>
<div id="keys-page-content"></div>
{% endblock %}

{% block modals %}
<div class="modal fade" id="createKeyModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content sg-modal-themed">
            <div class="modal-header border-bottom">
                <h5 class="modal-title"><i class="bi bi-key me-2"></i>New API Key</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="create-key-form" onsubmit="createNewKey(event)">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="new-key-name" placeholder="terraform-ci" required>
                        <div class="form-text">A label to identify this key.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select class="form-select" id="new-key-role" required>
                            <option value="viewer">Viewer — read-only access</option>
                            <option value="operator">Operator — sandbox, policy, provider management</option>
                            <option value="admin">Admin — full access including gateway and key management</option>
                        </select>
                    </div>
                    <div id="create-key-output"></div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-success" onclick="createNewKey(event)" id="create-key-btn">
                    <i class="bi bi-plus me-1"></i>Create
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/keys.js"></script>
<script>document.addEventListener('DOMContentLoaded', loadKeysPage);</script>
{% endblock %}
