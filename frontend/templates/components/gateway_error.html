<div id="gateway-error-banner" class="alert alert-danger d-flex align-items-center mb-2 py-2 sg-hidden-important" role="alert">

    <div class="flex-grow-1">
        <strong>Gateway disconnected.</strong>
        <span id="gateway-error-detail" class="ms-1">Attempting to reconnect...</span>

</div>
