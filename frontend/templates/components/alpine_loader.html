{#
    Shared Alpine.js loader partial.
    Loads the CSP build of Alpine when SHOREGUARD_CSP_STRICT=true, otherwise
    the regular build. Used by base.html and the standalone auth pages so
    the build choice stays consistent across the app.
#}
{% if csp_strict_enabled() %}
<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/csp@3.14.9/dist/cdn.min.js"></script>
{% else %}
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
{% endif %}
