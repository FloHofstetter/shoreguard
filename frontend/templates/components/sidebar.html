<aside class="sidebar" role="navigation" aria-label="Main navigation" :class="{ 'open': $sidebarOpen }" x-data>

    <!-- Main -->
    <div class="sidebar-section">
        <div class="sidebar-label">Navigation</div>
        <a class="sidebar-link {{ 'active' if active_page == 'dashboard' }}"
           href="/">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a class="sidebar-link {{ 'active' if active_page == 'gateways' }}"
           href="/gateways">
            <i class="bi bi-hdd-network"></i> Gateways
        </a>
        <a class="sidebar-link {{ 'active' if active_page == 'policies' }}"
           href="/policies">
            <i class="bi bi-shield-lock"></i> Policies
        </a>
    </div>

    <!-- Admin (only for admin role) -->
    <div class="sidebar-section" x-show="$isAdmin" x-cloak>
        <div class="sidebar-label">Admin</div>
        <a class="sidebar-link {{ 'active' if active_page == 'audit' }}"
           href="/audit">
            <i class="bi bi-journal-text"></i> Audit Log
        </a>
        <a class="sidebar-link {{ 'active' if active_page == 'groups' }}"
           href="/groups">
            <i class="bi bi-collection"></i> Groups
        </a>
        <a class="sidebar-link {{ 'active' if active_page == 'users' }}"
           href="/users">
            <i class="bi bi-people"></i> Users
        </a>
        <a class="sidebar-link {{ 'active' if active_page == 'webhooks' }}"
           href="/webhooks">
            <i class="bi bi-broadcast"></i> Webhooks
        </a>
    </div>

    <!-- Theme toggle + Gateway health (bottom) -->
    <div class="sidebar-section mt-auto">
        <button class="sidebar-link sg-btn-bare"
                @click="$toggleTheme()">
            <i class="bi" :class="$themeMode === 'dark' ? 'bi-sun' : 'bi-moon'"></i>
            <span x-text="$themeMode === 'dark' ? 'Light Mode' : 'Dark Mode'"></span>
        </button>
    </div>
    <div class="sidebar-section" x-show="GW" x-cloak>
        <div class="sidebar-health"
             :class="{
                 'text-success': $healthConnected,
                 'text-danger': !$healthConnected && $healthStatus !== 'unknown',
                 'text-muted': $healthStatus === 'unknown'
             }">
            <i class="bi bi-circle-fill"></i>
            <span x-text="$healthConnected
                ? ($healthVersion || 'Connected')
                : ($healthStatus === 'degraded' ? 'Degraded' : 'Disconnected')">
            </span>
        </div>
    </div>

</aside>
