name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pydoclint shoreguard

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync --group dev
      # CVE-2026-3219: pip 26.0.1 has a known vulnerability with no fix
      # version published yet. uv's resolver bundles pip 26.0.1 into the
      # dev environment for legacy editable-install fallbacks; the CVE
      # affects pip itself, not Shoreguard's runtime dependencies. Remove
      # the --ignore-vuln flag once pip ships a patched release.
      - run: uv run pip-audit --ignore-vuln CVE-2026-3219

  coverage-matrix:
    # Enforces the "every upstream RPC is covered by client + REST + UI"
    # invariant documented in docs/reference/surface-coverage.md.
    # Required job — a new RPC or REST route landing without coverage
    # blocks the merge until the chain is completed (or the allowlist
    # is updated with justification).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run python scripts/check_coverage.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync --group dev
      # -ll = medium severity and above; -q = quiet banner.
      # pip-audit covers dependency CVEs; bandit covers source-code SAST
      # for Python-specific patterns (eval, shell injection, insecure hashing).
      - run: uv run bandit -r shoreguard -ll -q

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pytest -m 'not integration' --cov=shoreguard --cov-report=term-missing

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - run: helm lint charts/shoreguard
      # `helm template` catches rendering errors that `helm lint` misses
      # (missing required values, bad pipelines, required()-gated fields).
      - name: Render default values
        run: helm template sg charts/shoreguard --set admin.password=ci-test-placeholder > /dev/null  # pragma: allowlist secret
      - name: Render production preset (existingSecret path)
        run: |  # pragma: allowlist secret
          helm template sg charts/shoreguard \
            -f charts/shoreguard/values.production.yaml \
            --set existingSecret=sg-secrets \
            --set ingress.host=ci.example.com \
            > /dev/null
      - name: Render production preset with inClusterGateways egress
        run: |  # pragma: allowlist secret
          helm template sg charts/shoreguard \
            -f charts/shoreguard/values.production.yaml \
            --set existingSecret=sg-secrets \
            --set ingress.host=ci.example.com \
            --set networkPolicy.egress.inClusterGateways.enabled=true \
            --set networkPolicy.egress.inClusterGateways.podSelector.matchLabels.app=openshell \
            > /dev/null
      - name: Render multi-replica footgun guard fires
        # Negative test: replicaCount=3 without secretKey must fail to render.
        run: |  # pragma: allowlist secret
          if helm template sg charts/shoreguard \
            --set admin.password=ci-test-placeholder \
            --set replicaCount=3 \
            --set database.url=postgresql://u:p@h/db \
            > /dev/null 2>&1; then
            echo "::error::expected helm template to fail (replicaCount=3 without secretKey)"
            exit 1
          fi

  # Internal test fixture for in-cluster federation — wraps NVIDIA's
  # OpenShell cluster image, NOT a user-facing chart. Kept in a
  # separate job so its lint/render status is tracked distinctly
  # from the production `charts/shoreguard` chart above, and so it
  # can't be mistaken for part of the supported install surface.
  # See tests/fixtures/charts/openshell-cluster/README.md for the
  # scope decision.
  m12-fixture-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - run: helm lint tests/fixtures/charts/openshell-cluster --set label.env=dev
      - name: Render openshell-cluster fixture (positive)
        run: |
          helm template cluster-dev tests/fixtures/charts/openshell-cluster \
            --set label.env=dev > /dev/null
          helm template cluster-staging tests/fixtures/charts/openshell-cluster \
            --set label.env=staging > /dev/null
      - name: Render openshell-cluster fixture missing label.env guard fires
        # Negative test: label.env empty must fail to render.
        run: |
          if helm template cluster-dev tests/fixtures/charts/openshell-cluster > /dev/null 2>&1; then
            echo "::error::expected helm template to fail (openshell-cluster fixture without label.env)"
            exit 1
          fi
