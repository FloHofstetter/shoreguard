name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write  # PyPI trusted publishing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Run full CI first ────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Build & push Docker image to GHCR ───────────────────────────────
  docker:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # OCI image references must be lowercase; github.repository keeps
      # whatever casing the repo was created with ("FloHofstetter/..."),
      # and Trivy rejects the uppercase form with a parse error. docker/metadata
      # and docker/build-push lowercase internally, but we need a lowercase
      # handle for the Trivy image-ref below.
      - name: Lowercase image name for OCI refs
        id: imgname
        env:
          IMAGE_NAME_RAW: ${{ env.IMAGE_NAME }}
        run: echo "lc=${IMAGE_NAME_RAW,,}" >> "$GITHUB_OUTPUT"

      - name: Compute build timestamp
        id: build_time
        run: echo "iso=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SHOREGUARD_VERSION=${{ steps.version.outputs.version }}
            SHOREGUARD_GIT_SHA=${{ github.sha }}
            SHOREGUARD_BUILD_TIME=${{ steps.build_time.outputs.iso }}

      # Scan the freshly pushed image by-digest to rule out tag race conditions.
      # ignore-unfixed = skip CVEs upstream has not released a fix for yet.
      # Fails the release only on CRITICAL/HIGH findings to stay noise-free.
      - name: Scan image for CRITICAL/HIGH CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.imgname.outputs.lc }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - uses: sigstore/cosign-installer@v3

      - name: Sign container image (keyless via GitHub OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          # Sign each tag by digest. One signature per tag, but all point
          # to the same multi-arch manifest — Fulcio issues an ephemeral
          # cert via GitHub OIDC, Rekor logs the signature publicly.
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

  # ── Build & publish Python package to PyPI ──────────────────────────
  pypi:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  # ── Create GitHub Release with CHANGELOG section as body ────────────
  github-release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create releases
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section for this version
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          # Extract the block between "## [X.Y.Z]" and the next "## [".
          # Skip the heading itself (the Release UI already shows the title
          # as H1, so a duplicate heading would be noise).
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > release_body.md
          if [ ! -s release_body.md ]; then
            echo "::error::No CHANGELOG section found for version $version"
            echo "Expected heading: ## [$version] — YYYY-MM-DD"
            exit 1
          fi
          # Append pull + verify hints so users see them on the Release page.
          cat >> release_body.md <<EOF

          ---

          ### Pull & Verify

          \`\`\`bash
          # Pull the image
          docker pull ghcr.io/flohofstetter/shoreguard:${version}

          # Verify signature (sigstore keyless)
          cosign verify ghcr.io/flohofstetter/shoreguard:${version} \\
            --certificate-identity-regexp 'https://github.com/FloHofstetter/shoreguard/.*' \\
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
          \`\`\`
          EOF
          echo "Extracted $(wc -l < release_body.md) lines for v${version}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ShoreGuard ${{ github.ref_name }}
          body_path: release_body.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: false
