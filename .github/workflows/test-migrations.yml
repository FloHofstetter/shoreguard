name: Test Migrations

on:
  pull_request:
    paths:
      - "shoreguard/alembic/**"
      - "shoreguard/models.py"
      - "shoreguard/db.py"
      - "tests/test_migrations.py"
  push:
    branches: [main]
    paths:
      - "shoreguard/alembic/**"
      - "shoreguard/models.py"
      - "shoreguard/db.py"
      - "tests/test_migrations.py"

jobs:
  migrations-sqlite:
    name: Migrations (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --group dev
      - name: Run migrations on fresh SQLite database
        run: uv run pytest tests/test_migrations.py -v -m 'not postgres'

  migrations-postgres:
    name: Migrations (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shoreguard
          POSTGRES_PASSWORD: shoreguard
          POSTGRES_DB: shoreguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --group dev
      - name: Run migrations on fresh PostgreSQL database
        env:
          DATABASE_URL: postgresql://shoreguard:shoreguard@localhost:5432/shoreguard_test
        run: uv run pytest tests/test_migrations.py -v -m postgres
