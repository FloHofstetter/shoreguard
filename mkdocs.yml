site_name: ShoreGuard
site_url: https://flohofstetter.github.io/shoreguard/
site_description: Open-source control plane for NVIDIA OpenShell
site_author: Florian Hofstetter
repo_url: https://github.com/FloHofstetter/shoreguard
repo_name: FloHofstetter/shoreguard
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2025–2026 Florian Hofstetter — Apache 2.0

theme:
  name: material
  palette:
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  logo: assets/logo.svg
  favicon: assets/favicon.svg

  icon:
    repo: fontawesome/brands/github

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FloHofstetter/shoreguard
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/shoreguard/

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_if_no_docstring: false
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Security Model: concepts/security.md
  - Guides:
      - Gateways: guides/gateways.md
      - Sandboxes: guides/sandboxes.md
      - Boot Hooks: guides/boot-hooks.md
      - Gateway Discovery: guides/gateway-discovery.md
      - Policies: guides/policies.md
      - Policy Pinning: guides/policy-pinning.md
      - Policy Prover: guides/policy-prover.md
      - GitOps: guides/gitops.md
      - Approvals: guides/approvals.md
      - Approval Workflows: guides/approval-workflows.md
      - Bypass Detection: guides/bypass-detection.md
      - SBOM: guides/sbom.md
      - Webhooks: guides/webhooks.md
      - Monitoring & Logs: guides/monitoring.md
      - Audit Log: guides/audit.md
  - Administration:
      - Users & RBAC: admin/rbac.md
      - OIDC / SSO: admin/oidc.md
      - Service Principals: admin/service-principals.md
      - Gateway-Scoped Roles: admin/gateway-roles.md
      - Deployment: admin/deployment.md
      - Production Kubernetes: deploy/production-k8s.md
      - Local Mode: admin/local-mode.md
      - Database Migrations: admin/database-migrations.md
      - Rollback Runbook: admin/rollback.md
      - Troubleshooting: admin/troubleshooting.md
  - Integrations:
      - Terraform: integrations/terraform.md
      - Prometheus Metrics: integrations/prometheus.md
      - OIDC Provider Setup: integrations/oidc-providers.md
  - Reference:
      - CLI: reference/cli.md
      - REST API: reference/api.md
      - Configuration: reference/configuration.md
      - Settings Reference: reference/settings.md
      - Policy Presets: reference/presets.md
      - Python API:
          - Client: reference/python/client.md
          - Services: reference/python/services.md
          - Models: reference/python/models.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
      - Code Structure: development/code-structure.md
      - Proto Stubs: development/proto-stubs.md
  - Changelog: changelog.md
